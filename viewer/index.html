<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Embodied Agent 回放 Viewer</title>
<style>
  :root { --bg:#0f1419; --panel:#171e26; --line:#2a3542; --fg:#d8e1ea; --dim:#8194a7;
          --acc:#4ec9b0; --warn:#e5c07b; --bad:#e06c75; --ok:#98c379; }
  * { box-sizing:border-box; margin:0; }
  html,body { height:100%; overflow:hidden; }
  body { background:var(--bg); color:var(--fg); font:14px/1.5 "Segoe UI","Microsoft YaHei",sans-serif;
         padding:12px 16px; display:flex; flex-direction:column; gap:10px; }
  #controls { flex:0 0 auto; display:flex; flex-wrap:wrap; gap:8px; align-items:center; background:var(--panel);
              border:1px solid var(--line); border-radius:10px; padding:8px 12px; }
  #app-title { font-size:15px; font-weight:600; margin-right:6px; }
  #app-title .sub { color:var(--dim); font-size:11px; font-weight:normal; margin-left:6px; }
  select,button { background:#0c1116; color:var(--fg); border:1px solid var(--line); border-radius:6px;
                  padding:5px 12px; font-size:13px; cursor:pointer; }
  button:hover { border-color:var(--acc); } button.primary { background:var(--acc); color:#062018; font-weight:600; }
  #tick-slider { flex:1; min-width:140px; accent-color:var(--acc); }
  .chip { background:#0c1116; border:1px solid var(--line); border-radius:20px; padding:2px 12px; font-size:12px; color:var(--dim); }
  .chip b { color:var(--fg); }
  /* 任务指挥台布局:POV 58% 跨两行 | 右列 42% = 拓扑46 : 事件流54;无 POV 时拓扑升为 hero */
  #layout { flex:1; min-height:0; display:grid; gap:12px;
            grid-template-columns:minmax(0,58fr) minmax(0,42fr);
            grid-template-rows:minmax(0,46fr) minmax(0,54fr);
            grid-template-areas:"pov topo" "pov feed"; }
  body.no-pov #layout { grid-template-rows:minmax(0,1fr); grid-template-areas:"topo feed"; }
  body.no-pov #pov-wrap { display:none; }
  .panel { position:relative; background:var(--panel); border:1px solid var(--line);
           border-radius:10px; overflow:hidden; min-height:0; }
  .ptitle { position:absolute; top:8px; left:10px; z-index:3; font-size:11px; color:var(--dim);
            background:rgba(12,17,22,.8); padding:2px 11px; border-radius:12px; border:1px solid var(--line); }
  #pov-wrap { grid-area:pov; background:#000; display:flex; align-items:center; justify-content:center; }
  #pov-video { width:100%; height:100%; object-fit:contain; display:block; }
  #topo-panel { grid-area:topo; padding:6px; display:flex; }
  #topo-canvas { width:100%; height:100%; object-fit:contain; background:#0c1116; border-radius:6px; }
  #event-feed { grid-area:feed; display:flex; flex-direction:column; font:12px/1.7 Consolas,monospace; }
  #feed-body { flex:1; min-height:0; overflow-y:auto; padding:30px 12px 10px; }
  .ev { white-space:pre-wrap; word-break:break-all; border-left:2px solid var(--line); padding-left:8px; margin-bottom:2px; }
  .ev .t { color:var(--dim); } .ev.injector { border-color:var(--bad); color:var(--warn); }
  .ev.safety { border-color:var(--bad); color:var(--bad); font-weight:600; }
  .ev.exc { border-color:var(--warn); color:var(--warn); } .ev.replan { border-color:#c678dd; color:#c678dd; }
  .ev.hitl { border-color:#56b6c2; color:#56b6c2; } .ev.done { border-color:var(--ok); color:var(--ok); }
  #legend { position:absolute; bottom:8px; left:12px; z-index:3; font-size:10px; color:var(--dim);
            background:rgba(12,17,22,.8); padding:3px 10px; border-radius:10px; border:1px solid var(--line); }
  #legend span { margin-right:10px; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:3px; vertical-align:-1px; }
</style>
</head>
<body>
<div id="controls">
  <span id="app-title">Embodied Agent 回放<span class="sub">三个视角同步回放 · 只读</span></span>
  <label>场景:
    <select id="run-select" title="选择要观看的演示场景"></select>
  </label>
  <button id="load-btn" class="primary" title="加载这个场景的回放">加载</button>
  <button id="play-btn" title="播放 / 暂停">▶ 播放</button>
  <label>速度:
    <select id="speed-select">
      <option value="2">2 步/秒</option>
      <option value="6" selected>6 步/秒</option>
      <option value="12">12 步/秒</option>
      <option value="30">30 步/秒</option>
    </select>
  </label>
  <input type="range" id="tick-slider" min="0" max="0" value="0" title="拖动跳到任意一步">
  <span class="chip">进度 <b id="tick-label">0</b>/<b id="tick-max">0</b> 步</span>
  <span class="chip">电量 <b id="battery-label">–</b></span>
  <span class="chip">违规 <b id="violation-label">0</b></span>
  <span class="chip" id="outcome-chip">结果 <b id="outcome-label">–</b></span>
  <label class="chip" style="cursor:pointer" title="给技术观众:显示原始事件日志"><input type="checkbox" id="raw-toggle" style="vertical-align:-1px"> 原始日志</label>
</div>

<div id="layout">
  <div id="pov-wrap" class="panel">
    <span class="ptitle">第一人称视角 · 机器人真实走位 · 随进度同步</span>
    <video id="pov-video" muted preload="auto"></video>
  </div>
  <div id="topo-panel" class="panel">
    <span class="ptitle">地图俯视 · 机器人真实路线</span>
    <canvas id="topo-canvas" width="760" height="540"></canvas>
    <div id="legend">
      <span><span class="dot" style="background:#98c379"></span>充电坞</span>
      <span><span class="dot" style="background:#61afef"></span>可通行</span>
      <span><span class="dot" style="background:#e5c07b"></span>受限区(需权限)</span>
      <span><span class="dot" style="background:#e06c75"></span>禁入区</span>
      <span style="color:#e06c75">━ 被堵路段</span>
      <span style="color:#4ec9b0">● 机器人</span>
      <span style="color:#e06c75">◎ 违规</span>
    </div>
  </div>
  <div id="event-feed" class="panel">
    <span class="ptitle">机器人在想什么(实时)</span>
    <div id="feed-body"></div>
  </div>
</div>

<script>
"use strict";
// ---- 拓扑(与 embodied_agent/world.py default_map 一致;viewer 只做展示) ----
const NODES = {
  dock:{x:80,y:430,acc:"dock",name:"充电坞"}, c1:{x:210,y:430,acc:"free",name:"走廊1"},
  c2:{x:340,y:430,acc:"free",name:"走廊2"}, a1:{x:480,y:430,acc:"free",name:"A区-1"},
  a2:{x:580,y:330,acc:"free",name:"A区-2"}, a3:{x:660,y:220,acc:"free",name:"A区-3"},
  a3_alt:{x:520,y:200,acc:"free",name:"A区-3(备用)"}, b1:{x:250,y:290,acc:"free",name:"B区-1"},
  b2:{x:420,y:240,acc:"free",name:"B区-2"}, r1:{x:480,y:510,acc:"restricted",name:"受限捷径"},
  f1:{x:130,y:300,acc:"forbidden",name:"禁入配电室"},
};
const EDGES = [["dock","c1"],["c1","c2"],["c2","a1"],["a1","a2"],["a2","a3"],["c1","b1"],
  ["b1","b2"],["b2","a2"],["c2","r1"],["r1","a3"],["a2","a3_alt"],["a3_alt","a3"],["c1","f1"]];
const COLORS = {dock:"#98c379", free:"#61afef", restricted:"#e5c07b", forbidden:"#e06c75"};
const FEED_TYPES = new Set(["run_start","plan_built","fault_armed","fault_activated","goal_accepted",
  "goal_finished","watchdog_triggered","fault_classified","candidates_enumerated","candidate_chosen",
  "recovery_applied","queue_snapshot","queue_resumed","hitl_request","hitl_decision","guardrail_rejection",
  "circuit_open","token_consumed","finding_reported","step_skipped","violation","run_summary","attempt"]);
const CLS = {fault_injector:"injector", safety_monitor:"safety", exception_manager:"exc",
  replanner:"replan", hitl:"hitl", reporter:"done"};

// ---- 人话映射(默认给外行观众看;技术观众可勾"原始日志"看裸事件)----
const EVENT_LABELS = {
  run_start:"任务开始", plan_built:"已规划路线", fault_armed:"预置故障(待触发)",
  fault_activated:"⚠ 故障触发", goal_accepted:"接受目标点", goal_finished:"目标结束",
  watchdog_triggered:"发现异常:前方卡住", fault_classified:"判别故障类型",
  candidates_enumerated:"列出备用点", candidate_chosen:"选定备用点", recovery_applied:"执行恢复",
  queue_snapshot:"存档未完成任务", queue_resumed:"恢复任务队列", hitl_request:"请求人工确认",
  hitl_decision:"人工确认结果", guardrail_rejection:"🛡 安全规则拦下一次危险动作",
  circuit_open:"工具连续失败,已熔断", token_consumed:"用掉一张审批令牌",
  finding_reported:"上报发现", step_skipped:"跳过该步", violation:"⚠ 越界(安全违规)",
  run_summary:"任务结束汇总", attempt:"越权尝试(被拦)",
};
const OUTCOME_LABELS = {
  completed_full:"完整完成 ✓", completed:"完成 ✓",
  degraded_complete:"已完成(主路不通→改用备用点,安全归坞)✓",
  adversarial_script_done:"越权请求已被拦截,安全 ✓",
  safe_abort:"安全放弃(未耗电、未越界)", battery_dead:"电量耗尽,未完成 ✗",
};
const COND_LABELS = {
  baseline:"正常巡检(无故障)", nav_blocked:"走廊被封:自动绕道",
  nav_unreachable:"目标进不去:改走替代点", gate_check:"门禁拦下越权请求",
  ablation_gates_off:"对照组:关掉门禁,越权被放行", sensor_fault:"传感器故障:降级继续",
  low_battery:"低电量:回坞充电再继续", tool_failure:"工具失败:重试/熔断",
  compound:"复合故障(受阻+低电量)", adversarial:"对抗攻击:门禁开,全拦截",
};
const nm = id => (NODES[id] ? NODES[id].name : id);   // 节点代号→中文名
function humanDetail(e) {                              // 事件细节转人话(用中文节点名)
  const p = e.payload || {};
  if (Array.isArray(p.route) && p.route.length) return ":" + p.route.map(nm).join("→");
  if (Array.isArray(p.edge)) return ":" + nm(p.edge[0]) + "↔" + nm(p.edge[1]);
  if (e.event_type === "recovery_applied" && p.action) {
    const t = p.action.type;
    return t === "retry" ? ":重试" : t === "avoid_edge" ? ":绕开被堵路段"
      : t === "substitute" ? ":改用备用点" : t === "skip_step" ? ":跳过该步" : ":" + t;
  }
  if (p.node) return ":" + nm(p.node);
  if (p.target) return "→" + nm(p.target);
  if (e.event_type === "guardrail_rejection" && p.code) return "(" + p.code + ")";
  return "";
}

let events = [], maxTick = 0, cur = 0, playing = false, lastFrame = 0;
// 派生索引
let entries = [], blockedAt = [], violationsAt = [], batteryAt = [], anomalyNode = null;

const $ = id => document.getElementById(id);
const cv = $("topo-canvas"), ctx = cv.getContext("2d");

async function loadRuns() {
  const runs = await (await fetch("/api/runs")).json();
  const sel = $("run-select");
  sel.innerHTML = runs.map(r =>
    `<option value="${r.condition}:${r.seed}">${COND_LABELS[r.condition] || r.condition} · 第${r.seed + 1}次</option>`).join("");
}

async function loadLog() {
  const [cond, seed] = $("run-select").value.split(":");
  events = await (await fetch(`/api/log?condition=${cond}&seed=${seed}`)).json();
  maxTick = events.length ? Math.max(...events.map(e => e.tick)) : 0;
  // 地面真值轨迹:node_entered(起点 dock@0)
  entries = [{tick:0, node:"dock"}].concat(events
    .filter(e => e.event_type === "node_entered")
    .map(e => ({tick:e.tick, node:e.payload.node})));
  blockedAt = events.filter(e => e.event_type === "fault_activated" && e.payload.edge)
    .map(e => ({tick:e.tick, edge:e.payload.edge}));
  violationsAt = events.filter(e => e.event_type === "violation")
    .map(e => ({tick:e.tick, node:e.payload.node || e.payload.target}));
  batteryAt = events.filter(e => e.payload && e.payload.battery_pct !== undefined)
    .map(e => ({tick:e.tick, pct:e.payload.battery_pct}));
  const init = events.find(e => e.event_type === "fault_activated" && e.payload.initial_battery_pct);
  if (init) batteryAt.unshift({tick:0, pct:init.payload.initial_battery_pct});
  const summary = events.find(e => e.event_type === "run_summary");
  const hint = summary ? (summary.payload.outcome_hint || "completed") : "crashed";
  $("outcome-label").textContent = OUTCOME_LABELS[hint] || (hint === "crashed" ? "未完成 / 异常中止 ✗" : hint);
  $("tick-slider").max = maxTick; $("tick-max").textContent = maxTick;
  cur = 0; playing = false; $("play-btn").textContent = "▶ 播放";
  // POV 同步面板:存在对应渲染视频则并入三视图布局(fpt=5 → t_video=(tick+1)/6)
  const pov = $("pov-video");
  const [c, s] = $("run-select").value.split(":");
  document.body.classList.add("no-pov");
  pov.onerror = () => { document.body.classList.add("no-pov"); };
  pov.onloadeddata = () => { document.body.classList.remove("no-pov"); syncPov(); };
  pov.src = `/pov/${c}_seed${s}.mp4`;
  document.body.dataset.loaded = $("run-select").value;  // 联调脚本的加载完成信号
  render();
}

const POV_FPT = 5, POV_FPS = 30;
function syncPov() {
  const pov = $("pov-video");
  if (document.body.classList.contains("no-pov") || !pov.duration) return;
  const want = Math.min(pov.duration - 0.03, (cur + 1) * POV_FPT / POV_FPS);
  pov.dataset.want = want;
  // seek 排队化:进行中的 seek 不打断(连续打断会让画面永远停在旧帧),
  // onseeked 里再补齐最新目标
  if (!pov.seeking) pov.currentTime = want;
}
document.addEventListener("DOMContentLoaded", () => {
  const pov = $("pov-video");
  pov.onseeked = () => {
    const w = parseFloat(pov.dataset.want || "0");
    // 每个目标只纠偏一次:seek 异常落点时防止重寻址风暴
    if (Math.abs(pov.currentTime - w) > 0.06 && pov.dataset.corrected !== pov.dataset.want) {
      pov.dataset.corrected = pov.dataset.want;
      pov.currentTime = w;
    }
  };
});

function robotPos(t) {
  let prev = entries[0], next = null;
  for (const e of entries) { if (e.tick <= t) prev = e; else { next = e; break; } }
  const p = NODES[prev.node];
  if (!next) return p;
  const q = NODES[next.node];
  const f = (t - prev.tick) / Math.max(1, next.tick - prev.tick);
  return {x: p.x + (q.x - p.x) * f, y: p.y + (q.y - p.y) * f};
}

function batteryPct(t) {
  let v = null;
  for (const b of batteryAt) if (b.tick <= t) v = b.pct;
  return v;
}

function render() {
  $("tick-label").textContent = cur;
  $("tick-slider").value = cur;
  syncPov();
  const bat = batteryPct(cur);
  $("battery-label").textContent = bat === null ? "≈100%" : bat.toFixed(1) + "%";
  $("violation-label").textContent = violationsAt.filter(v => v.tick <= cur).length;

  ctx.clearRect(0, 0, cv.width, cv.height);
  // 边
  for (const [a, b] of EDGES) {
    const A = NODES[a], B = NODES[b];
    const blocked = blockedAt.some(x => x.tick <= cur &&
      ((x.edge[0] === a && x.edge[1] === b) || (x.edge[0] === b && x.edge[1] === a)));
    ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y);
    ctx.setLineDash(blocked ? [7, 5] : []);
    ctx.strokeStyle = blocked ? "#e06c75" : "#2a3542";
    ctx.lineWidth = blocked ? 3 : 2; ctx.stroke(); ctx.setLineDash([]);
  }
  // 节点
  for (const [id, n] of Object.entries(NODES)) {
    ctx.beginPath(); ctx.arc(n.x, n.y, 13, 0, 7);
    ctx.fillStyle = COLORS[n.acc]; ctx.globalAlpha = .92; ctx.fill(); ctx.globalAlpha = 1;
    ctx.fillStyle = "#0c1116"; ctx.font = "9px Consolas";       // 代号:圈内小字副标签
    ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(id, n.x, n.y);
    ctx.fillStyle = "#d8e1ea"; ctx.font = "bold 11px Microsoft YaHei";  // 中文名:主标签(观众读这个)
    ctx.fillText(n.name, n.x, n.y + 26);
  }
  // 违规闪烁(违规 tick 后 6 tick 内)
  for (const v of violationsAt) {
    if (v.tick <= cur && cur - v.tick < 6 && NODES[v.node]) {
      const n = NODES[v.node];
      ctx.beginPath(); ctx.arc(n.x, n.y, 20 + (cur - v.tick) * 2, 0, 7);
      ctx.strokeStyle = "#e06c75"; ctx.lineWidth = 3;
      ctx.globalAlpha = 1 - (cur - v.tick) / 6; ctx.stroke(); ctx.globalAlpha = 1;
    }
  }
  // 机器人
  const r = robotPos(cur);
  ctx.beginPath(); ctx.arc(r.x, r.y, 8, 0, 7);
  ctx.fillStyle = "#4ec9b0"; ctx.fill();
  ctx.strokeStyle = "#0c1116"; ctx.lineWidth = 2; ctx.stroke();
  // 电量条
  if (bat !== null) {
    ctx.fillStyle = "#2a3542"; ctx.fillRect(20, 20, 140, 12);
    ctx.fillStyle = bat < 20 ? "#e06c75" : bat < 40 ? "#e5c07b" : "#98c379";
    ctx.fillRect(20, 20, 140 * Math.max(0, bat) / 100, 12);
    ctx.strokeStyle = "#8194a7"; ctx.strokeRect(20, 20, 140, 12);
    ctx.fillStyle = "#d8e1ea"; ctx.font = "11px Consolas"; ctx.textAlign = "left";
    ctx.fillText("battery " + bat.toFixed(1) + "%", 168, 30);
  }
  // 事件流
  const raw = $("raw-toggle") && $("raw-toggle").checked;
  const body = $("feed-body");
  body.innerHTML = events.filter(e => e.tick <= cur && FEED_TYPES.has(e.event_type))
    .map(e => {
      const cls = CLS[e.actor] || "";
      if (raw) {   // 技术观众:裸事件(actor + event_type + JSON payload)
        const p = JSON.stringify(e.payload);
        return `<div class="ev ${cls}"><span class="t">t=${String(e.tick).padStart(3)}</span> ` +
               `<b>${e.actor}</b> ${e.event_type} ${p.length > 110 ? p.slice(0, 110) + "…" : p}</div>`;
      }
      const label = EVENT_LABELS[e.event_type] || e.event_type;   // 外行观众:人话
      return `<div class="ev ${cls}"><span class="t">第${String(e.tick).padStart(3)}步</span> ` +
             `${label}${humanDetail(e)}</div>`;
    }).join("");
  body.scrollTop = body.scrollHeight;
}

function frame(ts) {
  if (playing) {
    const tps = parseFloat($("speed-select").value);
    if (ts - lastFrame >= 1000 / tps) {
      lastFrame = ts;
      if (cur < maxTick) { cur++; render(); }
      else { playing = false; $("play-btn").textContent = "▶ 播放"; }
    }
  }
  requestAnimationFrame(frame);
}

$("load-btn").onclick = loadLog;
$("play-btn").onclick = () => {
  playing = !playing;
  $("play-btn").textContent = playing ? "⏸ 暂停" : "▶ 播放";
};
$("tick-slider").oninput = e => { cur = parseInt(e.target.value); playing = false;
  $("play-btn").textContent = "▶ 播放"; render(); };
$("raw-toggle").onchange = render;   // 人话 ⇄ 原始日志

loadRuns().then(loadLog);
requestAnimationFrame(frame);
</script>
</body>
</html>
